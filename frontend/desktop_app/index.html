<!DOCTYPE html>
<html lang="pt-BR">
<head>


    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-W765CF64ZB"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-W765CF64ZB');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[ Sistema MATRIZ ]</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <!-- Google Fonts - JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'JetBrains Mono', monospace;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: #ffffff;
            min-height: 100vh;
            padding: 8px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            padding: 12px;
        }

        h1 {
            color: #333;
            margin-bottom: 2px;
            text-align: center;
            font-size: 1.1em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 8px;
            font-size: 0.75em;
        }

        .form-section {
            margin-bottom: 8px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .form-section h2 {
            color: #667eea;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        .form-group {
            margin-bottom: 8px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        input[type="text"],
        input[type="number"],
        input[type="file"],
        select {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 12px;
            background: white;
            transition: border-color 0.3s;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .file-upload {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .file-upload-label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            border: 1px dashed #667eea;
            border-radius: 6px;
            background: #f0f4ff;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 12px;
        }

        .file-upload-label:hover {
            background: #e6ebff;
            border-color: #764ba2;
        }

        .file-upload input {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .btn {
            background: #667eea;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
            margin-top: 4px;
        }

        .btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        /* Estilo para botão discreto (similar ao select) */
        #btnAbrirTabela {
            width: 100%;
            padding: 6px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 12px;
            background: white;
            color: #333;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'JetBrains Mono', monospace;
        }
        
        #btnAbrirTabela:hover:not(:disabled) {
            background: #f8f9fa;
            border-color: #667eea;
        }
        
        #btnAbrirTabela:disabled {
            background: #f5f5f5;
            color: #999;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .success-message {
            background: #4caf50;
            color: white;
            padding: 8px;
            border-radius: 6px;
            margin-top: 8px;
            font-size: 12px;
            display: none;
        }

        .error-message {
            background: #f44336;
            color: white;
            padding: 8px;
            border-radius: 6px;
            margin-top: 8px;
            font-size: 12px;
            display: none;
        }

        .file-name {
            margin-top: 4px;
            color: #666;
            font-size: 11px;
        }
        .logo-container {
            text-align: center;
            margin-bottom: 4px;
        }

        .matriz-logo {
            width: 48px;
            height: 48px;
            margin: 0 auto 4px;
            display: block;
            background: none;
            border: none;
            border-radius: 0;
            padding: 0;
            box-shadow: none;
        }

        .logo-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 8px;
        }

        #line-map-container {
            margin-top: 8px;
            width: 100%;
        }

        #line-map-container .caption {
            color: #333;
            margin-bottom: 4px;
            font-size: 0.9em;
            font-weight: 600;
        }

        #line-map {
            width: 100%;
            height: min(400px, calc(100vh - 260px));
            min-height: 220px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #ddd;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        /* Labels responsivos (mostra desktop ou mobile) */
        .label-mobile {
            display: none;
        }

        .label-desktop {
            display: inline;
        }

        /* Estilos do Leaflet */
        .leaflet-container {
            background: #ffffff;
        }

        /* Estilos para marcadores numerados */
        .numbered-marker {
            background: transparent;
            border: none;
        }

        .marker-number-label {
            background: #ff4444;
            color: white;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            font-weight: bold;
            border: none;
            box-shadow: none;
            text-align: center;
            line-height: 1;
        }

        /* Classes auxiliares para campos inline */
        .grid-two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .form-field {
            width: 100%;
            padding: 6px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 12px;
        }

        .form-label {
            display: block;
            margin-bottom: 2px;
            font-weight: 600;
            color: #333;
            font-size: 11px;
        }

        .select-nao-intercalar {
            width: 100%;
            padding: 4px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 11px;
            min-height: 80px;
        }

        .btn-row {
            display: flex;
            gap: 8px;
            margin-top: 4px;
        }
        .btn-row .btn {
            flex: 1;
            margin-top: 0;
        }

        /* Media Queries para Desktop - Expansão progressiva */
        @media (min-width: 1024px) {
            .container {
                max-width: 1000px;
            }
        }

        @media (min-width: 1280px) {
            .container {
                max-width: 1200px;
            }
        }

        @media (min-width: 1920px) {
            .container {
                max-width: 1400px;
            }
        }

        /* Media Queries para Mobile */
        @media (max-width: 768px) {
            body {
                padding: 8px;
            }

            .container {
                padding: 15px;
                border-radius: 10px;
            }

            .form-section {
                padding: 15px;
                margin-bottom: 20px;
            }

            h1 {
                font-size: 1.5em;
                margin-bottom: 8px;
            }

            .subtitle {
                font-size: 0.9em;
                margin-bottom: 20px;
            }

            .logo-container {
                margin-bottom: 20px;
            }

            .matriz-logo {
                width: 80px;
                height: 80px;
            }

            /* Aumenta font-size dos inputs para evitar zoom no iOS */
            input[type="text"],
            input[type="number"],
            input[type="file"],
            select,
            .form-field {
                font-size: 16px;
                padding: 12px;
            }

            .form-field {
                padding: 12px;
            }

            /* Botões com área de toque adequada */
            .btn {
                padding: 10px 14px;
                font-size: 13px;
            }

            /* Grid de 2 colunas vira 1 coluna no mobile */
            .grid-two-columns {
                grid-template-columns: 1fr;
                gap: 8px;
            }

            /* Mapa com altura adequada */
            #line-map {
                height: min(300px, calc(100vh - 280px));
                min-height: 200px;
            }

            /* Select "Não Intercalar" compacto */
            .select-nao-intercalar {
                min-height: 70px;
                font-size: 12px;
            }

            #line-map-container {
                margin-top: 8px;
            }

            .form-group {
                margin-bottom: 6px;
            }

            .file-upload-label {
                padding: 10px;
            }

            #btnAbrirTabela {
                font-size: 12px;
                padding: 8px;
            }

            /* Mostra label mobile, esconde desktop */
            .label-mobile {
                display: inline;
            }

            .label-desktop {
                display: none;
            }
        }

        /* Media Query para telas muito pequenas */
        @media (max-width: 480px) {
            body {
                padding: 5px;
            }

            .container {
                padding: 12px;
            }

            .form-section {
                padding: 12px;
            }

            h1 {
                font-size: 1.3em;
            }

            .subtitle {
                font-size: 0.85em;
            }

            .matriz-logo {
                width: 40px;
                height: 40px;
            }

            #line-map {
                height: min(250px, calc(100vh - 300px));
                min-height: 180px;
            }

            .select-nao-intercalar {
                min-height: 60px;
            }
        }

        /* Estilo para o marcador de localização do usuário */
        .user-location-marker {
            background: transparent;
            border: none;
        }
        
        /* Estilo para o botão de geolocalização quando desabilitado */
        #btnMinhaLocalizacao:disabled {
            background: #6c757d !important;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <div class="matriz-logo" id="logoReset" style="cursor: pointer;" title="Clique para resetar o sistema">
                <img src="assets/logo.png" alt="Logo Sistema Matriz" class="logo-image">
            </div>
        </div>
        <h1>[ Sistema Matriz ]</h1>
        <p class="subtitle">Projeto Automatizado de Redes de Distribuição Eletrica</p>

        <!-- Opção 1: Upload de Arquivo -->
        <div class="form-section">
            <div class="form-group">
                <div class="file-upload">
                    <label class="file-upload-label">
                        <span>📎 Clique ou arraste para importar kml/html</span>
                        <input type="file" id="fileInput" accept=".csv,.xlsx,.xls,.kml,.kmz,.html">
                    </label>
                </div>
                <div class="file-name" id="fileName"></div>
            </div>
            <input type="file" id="csvImportInput" accept=".csv" style="display: none;">
            <div class="btn-row">
                <button class="btn" id="btnImportarArquivo">Importar Matriz CSV</button>
                <button class="btn" id="btnPlotarProjeto">Plotar Projeto</button>
            </div>
            
            <!-- Mapa Leaflet (exibido automaticamente) -->
            <div id="line-map-container" style="margin-top: 8px; display: block;">
                <h2 class="caption">Mapa da linha</h2>
                <div id="line-map"></div>
                <button class="btn" id="btnFinalizarPolilinha" style="margin-top: 6px; display: none;">✅ Finalizar Polilinha</button>
                <button class="btn" id="btnInverterSentido" style="margin-top: 4px;" disabled>🔄 Inverter Sentido</button>
                
                <!-- Campos de Seleção -->
                <div class="grid-two-columns" style="margin-top: 8px;">
                    <!-- Número do Módulo -->
                    <div class="form-group">
                        <label for="numeroModulo" class="form-label">Número do Módulo:</label>
                        <input type="text" id="numeroModulo" class="form-field" 
                               placeholder="Digite apenas números"
                               pattern="[0-9]*"
                               inputmode="numeric"
                               onkeypress="return (event.charCode >= 48 && event.charCode <= 57)">
                    </div>
                    
                    <!-- Descrição do Módulo -->
                    <div class="form-group">
                        <label for="descricaoModulo" class="form-label">Descrição do Módulo:</label>
                        <div id="descricaoModulo" class="form-field" 
                             style="background: #f5f5f5; color: #666; min-height: 20px;">
                            <- Digitar código do módulo
                        </div>
                    </div>
                </div>
                
                <!-- Botão Abrir Tabela de Dados -->
                <div style="margin-top: 6px;">
                    <button id="btnAbrirTabela" disabled>📊 Consultar e definir Modulos</button>
                </div>
                
                <!-- Select Poste da Derivação e Vão Frouxo -->
                <div class="grid-two-columns" style="margin-top: 6px;">
                    <!-- Poste da Derivação -->
                    <div class="form-group">
                        <label for="posteDerivacao" class="form-label">Poste da derivação:</label>
                        <select id="posteDerivacao" class="form-field">
                            <option value="">Selecione...</option>
                            <option value="Implantar">Implantar</option>
                            <option value="Existente">Existente</option>
                        </select>
                    </div>
                    
                    <!-- Vão Frouxo -->
                    <div class="form-group">
                        <label for="vaoFrouxo" class="form-label">Vão Frouxo:</label>
                        <select id="vaoFrouxo" class="form-field">
                            <option value="">Selecione...</option>
                            <option value="sim">sim</option>
                            <option value="não">não</option>
                        </select>
                    </div>
                </div>
                
                <!-- Select Não Intercalar Postes -->
                <div class="form-group" style="margin-top: 6px;">
                    <label for="naoIntercalarPostes" class="form-label">
                        <span class="label-desktop">Não Intercalar Postes (Ctrl+Click para selecionar múltiplos):</span>
                        <span class="label-mobile">Não Intercalar Postes (Toque e segure para selecionar múltiplos):</span>
                    </label>
                    <select id="naoIntercalarPostes" class="select-nao-intercalar" 
                            size="5"
                            multiple>
                        <option value="">Nenhum vértice carregado</option>
                    </select>
                </div>
                
                <!-- Botão Gerar Matriz -->
                <div style="margin-top: 6px;">
                    <button class="btn" id="btnGerarMatriz" disabled>Gerar Matriz</button>
                </div>
            </div>
        </div>

        <!-- Mensagens -->
        <div class="success-message" id="successMessage"></div>
        <div class="error-message" id="errorMessage"></div>

        <!-- Rodapé - Download Sistema CAD -->
        <footer style="margin-top: 16px; padding-top: 12px; border-top: 1px solid #eee;">
            <a href="/download/sistema-cad" download="sistema_cad.zip" class="btn" style="display: block; text-decoration: none; text-align: center;">
                Baixar sistema Matriz-CAD Projeto Automático
            </a>
        </footer>
    </div>

    <!-- Leaflet CSS (deve estar antes do JS) -->
    <link rel="stylesheet" href="libs/leaflet.css"/>
    
    <!-- Bibliotecas locais (serão substituídas por versões embutidas durante o build) -->
    <script src="libs/papaparse.min.js"></script>
    <script src="libs/FileSaver.min.js"></script>
    <script src="libs/xlsx.full.min.js"></script>
    <script src="libs/leaflet.js"></script>

    <!-- Dados da tabela para busca -->
    <script src="tabela-data.js?v=3"></script>
    
    <!-- Código principal da aplicação -->
    <script src="app.js"></script>
</body>
</html>
